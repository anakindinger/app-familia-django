{% extends 'base.html' %}
{% block content %}
<h2>Chat - {{ child.name }}</h2>
<div id="chat-box" class="border rounded p-3 mb-3 bg-light" style="height: 350px; overflow-y: auto;">
  {% for msg in messages %}
    <div class="mb-2">
      <strong>{{ msg.user.username }}:</strong> {{ msg.text }}
      <span class="text-muted small">{{ msg.created_at|date:'d/m/Y H:i' }}</span>
    </div>
  {% empty %}
    <p class="text-muted">Nenhuma mensagem ainda.</p>
  {% endfor %}
</div>
<form method="post" class="d-flex gap-2">
  {% csrf_token %}
  <input type="text" name="text" class="form-control" placeholder="Digite sua mensagem..." autocomplete="off" required>
  <button type="submit" class="btn btn-primary">Enviar</button>
</form>
<script>
// Scroll automático para o final do chat
window.onload = function() {
  var chatBox = document.getElementById('chat-box');
  chatBox.scrollTop = chatBox.scrollHeight;
};
</script>
{% endblock %}
