{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
  <h2>Cadastro de Usuário</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Cadastrar</button>
  </form>
  <a href="{% url 'usuario:login' %}">Já tem conta? Faça login</a>
</div>
{% endblock %}
